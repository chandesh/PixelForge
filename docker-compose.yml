services:
  db:
    image: postgres:16
    ports:
      - "5454:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pixelforge}
      POSTGRES_USER: ${POSTGRES_USER:-pixelforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pixelforge}

  redis:
    image: redis:7-alpine
    ports:
      - "6363:6379"

  backend:
    build: ./backend
    ports:
      - "8383:8383"
    volumes:
      - ./backend:/app
      - ./media:/app/media
    env_file: .env
    depends_on:
      - db
      - redis
    command: python manage.py runserver 0.0.0.0:8383

  worker:
    build: ./backend
    volumes:
      - ./media:/app/media
    env_file: .env
    depends_on:
      - db
      - redis
    command: celery -A core.celery worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "4300:4300"
    volumes:
      - ./frontend/src:/app/src
    env_file: .env
    command: npm start

volumes:
  pgdata_dev:
  frontend_node_modules:
